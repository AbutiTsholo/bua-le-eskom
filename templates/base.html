<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}⚡ Bua le Eskom{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-red: #525050; --dark-blue: #525050; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Segoe UI', system-ui; }
        .navbar { background: var(--dark-blue) !important; }
        .navbar-brand { color: white !important; }
        .nav-link { color: rgba(255,255,255,0.8) !important; }
        .nav-link:hover, .nav-link.active { color: white !important; }
        .stats-card { background: white; border-radius: 1px; padding: 2rem; }
        .update-item { background: white; border-left: 4px solid var(--primary-red); padding: 1rem; margin-bottom: 0.5rem; border-radius: 8px; }
        .btn-track { background: #525050; border: none; padding: 0.75rem 2rem; border-radius: 50px; font-weight: 600; font-size: 1.1rem; }
        .btn-report { background: var(--primary-red); border: none; padding: 0.75rem 2rem; border-radius: 50px; font-weight: 600; font-size: 1.1rem; }
        .btn-notif { background: #525050; border: none; padding: 0.75rem 2rem; border-radius: 50px; font-weight: 600; font-size: 1.1rem; }
        .map-container { height: 300px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        @media (max-width: 768px) { .map-container { height: 250px; } }
      /*  {% block extra_styles %}{% endblock %}*/
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="{% url 'home' %}">⚡ Bua le Eskom</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}" href="{% url 'login' %}">Login</a>
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'report_fault' %}active{% endif %}" href="{% url 'report_fault' %}">Report Fault</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}" href="{% url 'notifications' %}">Notifications</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="nav-link">Hi {{ user.username }}!</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'register' %}">Register</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
