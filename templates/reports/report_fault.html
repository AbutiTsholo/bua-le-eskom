<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report a fault</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 15px 20px; border-radius: 8px; }
        .progress { color: #7f8c8d; margin: 10px 0; }
        .question { font-size: 18px; font-weight: bold; margin: 20px 0 10px; }
        .option { display: block; width: 100%; padding: 15px; margin: 8px 0;
                  background: white; border: 2px solid #dfe6e9; border-radius: 8px;
                  font-size: 16px; cursor: pointer; text-align: left; }
        .option:hover { border-color: #e74c3c; background: #fff5f5; }
        .btn-next { display: block; width: 100%; padding: 15px; margin-top: 20px;
                    background: #e74c3c; color: white; border: none;
                    border-radius: 8px; font-size: 16px; cursor: pointer; }
        .back { color: #3498db; text-decoration: none; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header"><h2>Report a Fault</h2></div>
    <a class="back" href="/">← Back to Home</a>
    <p class="progress">Step 1 of 3 &nbsp; ● ○ ○</p>
    <p class="question">What type of fault are you experiencing?</p>
    <button class="option">⚡ Power outage</button>
    <button class="option">🔌 Electrical hazard</button>
    <button class="option">💡 Street light fault</button>
    <button class="option">🔧 Other electrical issue</button>
    <button class="btn-next">NEXT →</button>
</body>
</html>
