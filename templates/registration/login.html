<!DOCTYPE html>
<html>
<head>
    <title>Bua le Eskom – Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4;
               min-height: 100vh; display: flex; align-items: center;
               justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 35px 30px;
                width: 100%; max-width: 400px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { font-size: 24px; color: #2c3e50; }
        .logo p { color: #7f8c8d; font-size: 13px; margin-top: 5px; }
        label { display: block; font-size: 13px; color: #555;
                margin-bottom: 6px; margin-top: 16px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; border: 2px solid #dfe6e9;
            border-radius: 6px; font-size: 15px; }
        input:focus { outline: none; border-color: #e74c3c; }
        .btn { display: block; width: 100%; padding: 14px;
               background: #e74c3c; color: white; border: none;
               border-radius: 8px; font-size: 16px; cursor: pointer;
               margin-top: 20px; }
        .btn:hover { background: #c0392b; }
        .register-link { text-align: center; margin-top: 18px;
                         font-size: 14px; color: #7f8c8d; }
        .register-link a { color: #e74c3c; text-decoration: none; }
        .error { background: #fdecea; color: #c0392b; padding: 10px;
                 border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🔔 Bua le Eskom</h1>
            <p>Speak to Eskom — Mahikeng Community</p>
        </div>

        {% if form.errors %}
        <div class="error">Invalid username or password. Please try again.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Enter your username" required>

            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" placeholder="Enter your password" required>

            <button class="btn" type="submit">Log In</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register/">Register here</a>
        </div>
    </div>
</body>
</html>
